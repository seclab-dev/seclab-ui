name: Publish to npmjs.org

run-name: "${{ inputs.package }} ${{ inputs.version }} to npmjs"

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        default: "@seclab-dev/vue"
        type: choice
        options:
          - "@seclab-dev/tokens"
          - "@seclab-dev/icons"
          - "@seclab-dev/suite-sdk"
          - "@seclab-dev/vue"
          - "@seclab-dev/react"
      version:
        description: Package SemVer
        required: true
        default: 0.1.0-alpha.1
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release request
        id: release
        env:
          RELEASE_PACKAGE: ${{ inputs.package }}
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          case "$RELEASE_PACKAGE" in
            '@seclab-dev/tokens') TAG_PREFIX='tokens-' ;;
            '@seclab-dev/icons') TAG_PREFIX='icons-' ;;
            '@seclab-dev/suite-sdk') TAG_PREFIX='suite-sdk-' ;;
            '@seclab-dev/vue') TAG_PREFIX='vue-' ;;
            '@seclab-dev/react') TAG_PREFIX='react-' ;;
            *) echo "Unsupported package: $RELEASE_PACKAGE"; exit 1 ;;
          esac
          echo "package=$RELEASE_PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_PREFIX$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve release source
        id: source
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          if git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            git checkout --detach "refs/tags/$RELEASE_TAG"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Reusing existing release tag: $RELEASE_TAG"
          else
            git fetch origin main
            if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
              echo "New release tags must be created from the latest main commit"
              exit 1
            fi
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: "@seclab-dev"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release metadata
        id: metadata
        env:
          RELEASE_PACKAGE: ${{ steps.release.outputs.package }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          if ! node -e "const semver = require('semver'); process.exit(semver.valid(process.argv[1]) ? 0 : 1)" "$RELEASE_VERSION"; then
            echo "Invalid SemVer in release tag: $RELEASE_TAG"
            exit 1
          fi
          ACTUAL_VERSION=$(node -e "
            const fs = require('node:fs')
            const paths = {
              '@seclab-dev/tokens': 'packages/tokens/package.json',
              '@seclab-dev/icons': 'packages/icons/package.json',
              '@seclab-dev/suite-sdk': 'packages/suite-sdk/package.json',
              '@seclab-dev/vue': 'packages/vue/package.json',
              '@seclab-dev/react': 'packages/react/package.json'
            }
            const manifest = JSON.parse(fs.readFileSync(paths[process.env.RELEASE_PACKAGE], 'utf8'))
            process.stdout.write(manifest.version)
          ")
          if [ "$ACTUAL_VERSION" != "$RELEASE_VERSION" ]; then
            echo "$RELEASE_PACKAGE version is $ACTUAL_VERSION, expected $RELEASE_VERSION"
            exit 1
          fi
          NPM_TAG=$(node --input-type=module -e "
            import semver from 'semver'
            const prerelease = semver.prerelease(process.env.RELEASE_VERSION)
            const prefix = prerelease?.[0]
            const tag = typeof prefix === 'string' && /^[a-z][a-z0-9-]*$/i.test(prefix)
              ? prefix
              : prerelease
                ? 'next'
                : 'latest'
            process.stdout.write(tag)
          ")
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"

      - name: Run release quality checks
        run: pnpm check

      - name: Reject existing versions
        env:
          RELEASE_PACKAGE: ${{ steps.release.outputs.package }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          if npm view "$RELEASE_PACKAGE@$RELEASE_VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "$RELEASE_PACKAGE@$RELEASE_VERSION already exists on npmjs.org"
            exit 1
          fi

      - name: Verify framework package dependencies
        if: steps.release.outputs.package == '@seclab-dev/vue' || steps.release.outputs.package == '@seclab-dev/react'
        env:
          RELEASE_PACKAGE: ${{ steps.release.outputs.package }}
        shell: bash
        run: |
          node --input-type=module <<'NODE' > /tmp/vue-dependencies.txt
          import { readFileSync } from 'node:fs'

          const packageDirectories = {
            '@seclab-dev/vue': 'packages/vue/package.json',
            '@seclab-dev/react': 'packages/react/package.json'
          }
          const dependencyDirectories = {
            '@seclab-dev/icons': 'packages/icons/package.json',
            '@seclab-dev/tokens': 'packages/tokens/package.json'
          }
          const manifest = JSON.parse(readFileSync(packageDirectories[process.env.RELEASE_PACKAGE], 'utf8'))
          for (const name of ['@seclab-dev/icons', '@seclab-dev/tokens']) {
            const declaredVersion = manifest.dependencies[name]
            const dependencyVersion = declaredVersion?.startsWith('workspace:')
              ? JSON.parse(readFileSync(dependencyDirectories[name], 'utf8')).version
              : declaredVersion
            console.log(`${name}@${dependencyVersion}`)
          }
          NODE
          while read -r dependency; do
            if ! npm view "$dependency" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
              echo "Required dependency is not published on npmjs.org: $dependency"
              exit 1
            fi
          done < /tmp/vue-dependencies.txt

      - name: Ensure release tag
        if: steps.source.outputs.exists != 'true'
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
            if [ "$(git rev-list -n 1 "$RELEASE_TAG")" != "$(git rev-parse HEAD)" ]; then
              echo "Release tag already points to a different commit: $RELEASE_TAG"
              exit 1
            fi
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag --annotate "$RELEASE_TAG" --message "Release $RELEASE_TAG"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Pack selected package
        id: pack
        env:
          RELEASE_PACKAGE: ${{ steps.release.outputs.package }}
        shell: bash
        run: |
          PACK_DIR=$(mktemp -d)
          pnpm --filter "$RELEASE_PACKAGE" pack --pack-destination "$PACK_DIR"
          PACKAGE_FILE=$(find "$PACK_DIR" -maxdepth 1 -name "*.tgz" -print -quit)
          if [ -z "$PACKAGE_FILE" ]; then
            echo "No package archive was created"
            exit 1
          fi
          echo "file=$PACKAGE_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish package
        env:
          NPM_TAG: ${{ steps.metadata.outputs.npm_tag }}
        shell: bash
        run: |
          npm publish "${{ steps.pack.outputs.file }}" --tag "$NPM_TAG" --access public --provenance --registry=https://registry.npmjs.org
